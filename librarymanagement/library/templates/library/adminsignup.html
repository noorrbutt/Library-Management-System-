{% load static %}
{% load socialaccount %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Signup — LibraryMS</title>
  <link rel="icon" href="{% static 'metronic/assets/media/app/favicon.ico' %}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'metronic/assets/css/styles.css' %}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: 'Inter', sans-serif; background: #f4f6fa; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding-top: 72px; }
    .auth-card { background: #fff; border-radius: 16px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); padding: 40px; width: 100%; max-width: 440px; }
    .auth-logo { display: flex; align-items: center; gap: 10px; justify-content: center; margin-bottom: 28px; }
    .auth-logo .icon { width: 44px; height: 44px; border-radius: 10px; background: #3b82f6; display: flex; align-items: center; justify-content: center; }
    .auth-logo span { font-size: 1.2rem; font-weight: 700; color: #111827; }
    h2 { font-size: 1.3rem; font-weight: 700; color: #111827; text-align: center; margin: 0 0 6px; }
    .sub { font-size: 0.85rem; color: #6b7280; text-align: center; margin: 0 0 24px; }
    label { display: block; font-size: 0.8rem; font-weight: 600; color: #374151; margin-bottom: 5px; }
    .input-wrap { position: relative; margin-bottom: 14px; }
    .input-wrap i.icon-left { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: #9ca3af; font-size: 0.85rem; }
    input[type=text], input[type=password] {
      width: 100%; padding: 10px 12px 10px 36px; border: 1px solid #d1d5db;
      border-radius: 8px; font-size: 0.875rem; color: #1f2937; font-family: inherit;
      outline: none; transition: border 0.15s, box-shadow 0.15s;
    }
    input:focus { border-color: #3b82f6; box-shadow: 0 0 0 3px rgba(59,130,246,0.1); }
    input.is-invalid { border-color: #dc2626; }
    .error-msg { color: #dc2626; font-size: 0.78rem; margin-top: 3px; display: none; }
    .btn-signup { width: 100%; padding: 11px; background: #3b82f6; color: #fff; border: none; border-radius: 8px; font-size: 0.9rem; font-weight: 600; cursor: pointer; font-family: inherit; transition: background 0.15s; margin-top: 6px; }
    .btn-signup:hover { background: #2563eb; }
    .btn-google { width: 100%; padding: 10px; background: #fff; color: #374151; border: 1px solid #d1d5db; border-radius: 8px; font-size: 0.875rem; font-weight: 500; cursor: pointer; font-family: inherit; transition: background 0.15s; margin-top: 10px; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
    .btn-google:hover { background: #f9fafb; }
    .divider { display: flex; align-items: center; gap: 10px; margin: 16px 0; color: #9ca3af; font-size: 0.8rem; }
    .divider::before, .divider::after { content: ''; flex: 1; border-top: 1px solid #e5e7eb; }
    .link-row { text-align: center; margin-top: 18px; font-size: 0.82rem; color: #6b7280; }
    .link-row a { color: #3b82f6; text-decoration: none; font-weight: 500; }
    .top-nav { position: fixed; top: 0; left: 0; right: 0; background: #fff; border-bottom: 1px solid #e5e7eb; display: flex; align-items: center; justify-content: space-between; padding: 12px 24px; z-index: 100; }
    .top-nav .brand { font-weight: 700; font-size: 1rem; color: #111827; display: flex; align-items: center; gap: 8px; }
    .nav-btn { padding: 6px 14px; border-radius: 8px; font-size: 0.82rem; font-weight: 500; text-decoration: none; border: 1px solid #e5e7eb; color: #374151; transition: background 0.15s; }
    .nav-btn:hover { background: #f3f4f6; }
  </style>
</head>
<body>
  <nav class="top-nav">
    <div class="brand"><i class="fas fa-book-open" style="color:#3b82f6;"></i>LibraryMS</div>
    <div style="display:flex;gap:8px;">
      <a href="{% url 'home' %}" class="nav-btn">Home</a>
      <a href="{% url 'adminclick' %}" class="nav-btn">Admin</a>
    </div>
  </nav>

  <div class="auth-card">
    <div class="auth-logo">
      <div class="icon"><i class="fas fa-book-open" style="color:#fff;"></i></div>
      <span>LibraryMS</span>
    </div>
    <h2>Create Account</h2>
    <p class="sub">Register a new admin account</p>

    <form method="post" id="signupForm">
      {% csrf_token %}
      <label>Full Name</label>
      <div class="input-wrap"><i class="fas fa-user icon-left"></i><input type="text" name="name" placeholder="Your name" required></div>
      <label>Username</label>
      <div class="input-wrap"><i class="fas fa-user-circle icon-left"></i><input type="text" name="username" placeholder="Choose a username" required></div>
      <label>Password</label>
      <div class="input-wrap"><i class="fas fa-lock icon-left"></i><input type="password" id="password" name="password" placeholder="Create a password" required></div>
      <label>Confirm Password</label>
      <div class="input-wrap"><i class="fas fa-lock icon-left"></i><input type="password" id="confirm_password" name="confirm_password" placeholder="Repeat password" required></div>
      <p class="error-msg" id="passwordError">Passwords do not match.</p>
      <button type="submit" class="btn-signup">Create Account</button>
      <div class="divider">or</div>
      <a href="{% provider_login_url 'google' %}" class="btn-google"><i class="fab fa-google" style="color:#ea4335;"></i>Continue with Google</a>
    </form>
    <div class="link-row">Already have an account? <a href="{% url 'adminlogin' %}">Login here</a></div>
  </div>

  <script>
    document.getElementById('signupForm').addEventListener('submit', function(e) {
      const pw = document.getElementById('password').value;
      const cpw = document.getElementById('confirm_password').value;
      const err = document.getElementById('passwordError');
      if (pw !== cpw) {
        e.preventDefault();
        document.getElementById('confirm_password').classList.add('is-invalid');
        err.style.display = 'block';
        document.getElementById('confirm_password').focus();
      } else {
        document.getElementById('confirm_password').classList.remove('is-invalid');
        err.style.display = 'none';
      }
    });
  </script>
</body>
</html>

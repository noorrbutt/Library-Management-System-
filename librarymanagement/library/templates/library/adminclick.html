{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Admin Portal — LibraryMS</title>
  <link rel="icon" href="{% static 'metronic/assets/media/app/favicon.ico' %}"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="{% static 'metronic/assets/css/styles.css' %}"/>
  <link rel="stylesheet" href="{% static 'library/css/custom.css' %}"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
</head>
<body>
  <nav class="top-nav">
    <div class="brand"><i class="fas fa-book-open" style="color:#3b82f6;"></i>LibraryMS</div>
    <div>
      <a href="{% url 'home' %}" class="nav-btn">Home</a>
      <a href="{% url 'adminlogin' %}" class="nav-btn">Log In</a>
    </div>
  </nav>

  <div class="hero">
    <div class="hero-inner">
      <div class="hero-icon"><i class="fas fa-shield-alt" style="color:#fff;font-size:1.8rem;"></i></div>
      <h1>Admin Portal</h1>
      <p>Welcome to the Library Management System admin panel. Log in or create an account to manage books, students, and borrowing records.</p>
      <div class="cta-row">
        <a href="{% url 'adminlogin' %}" class="btn-solid"><i class="fas fa-sign-in-alt"></i> Login</a>
        <a href="{% url 'adminsignup' %}" class="btn-outline"><i class="fas fa-user-plus"></i> Sign Up</a>
      </div>
    </div>
  </div>

  <div class="features">
    <div class="feature"><i class="fas fa-book"></i><span>Manage Books</span></div>
    <div class="feature"><i class="fas fa-users"></i><span>Student Records</span></div>
    <div class="feature"><i class="fas fa-chart-line"></i><span>Analytics</span></div>
  </div>
  <div style="height:60px;"></div>
</body>
</html>
